---
version: '3.7'

include:
  - docker-compose.dpu.yml

services:
  bootstrap:
    image: docker.io/opiproject/sztpd:0.0.15
    depends_on:
      setup-cert:
        condition: service_completed_successfully
    volumes:
      - server-certs:/certs
      - ./images:/media
      - ./config:/mnt
      - ./scripts/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh
    entrypoint: /usr/local/bin/docker-entrypoint.sh
    environment:
      SZTPD_INIT_PORT: 6080
      SZTPD_NBI_PORT: 7080
      SZTPD_SBI_PORT: 9090
      SZTPD_INIT_MODE: 1
      SZTPD_ACCEPT_CONTRACT: "Yes"
      SZTPD_INIT_ADDR: 0.0.0.0
      SZTPD_OPI_MODE: "running"
      SZTPD_RETRY_ATTEMPTS: 30
    ports:
      - 7080:7080
      - 9090:9090
    networks:
      - opi
    healthcheck:
      test: ["CMD-SHELL", "curl --fail -H Accept:application/yang-data+json http://127.0.0.1:$$SZTPD_NBI_PORT/.well-known/host-meta || exit 1"]

  redirecter:
    image: docker.io/opiproject/sztpd:0.0.15
    depends_on:
      setup-cert:
        condition: service_completed_successfully
    volumes:
      - server-certs:/certs
      - ./config/sztpd.redirect.json.template:/mnt/sztpd.redirect.json.template
      - ./scripts/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh
    entrypoint: /usr/local/bin/docker-entrypoint.sh
    environment:
      SZTPD_INIT_PORT: 6080
      SZTPD_NBI_PORT: 7070
      SZTPD_SBI_PORT: 8080
      SZTPD_INIT_MODE: 1
      SZTPD_ACCEPT_CONTRACT: "Yes"
      SZTPD_INIT_ADDR: 0.0.0.0
      BOOTSVR_PORT: 9090
      BOOTSVR_ADDR: "bootstrap"
      SZTPD_OPI_MODE: "redirect"
      SZTPD_RETRY_ATTEMPTS: 30
    ports:
      - 8080:8080
    networks:
      - opi
    healthcheck:
      test: ["CMD-SHELL", "curl --fail -H Accept:application/yang-data+json http://127.0.0.1:$$SZTPD_NBI_PORT/.well-known/host-meta || exit 1"]

  dhcp:
    image: docker.io/networkboot/dhcpd:1.3.0
    environment:
      NODE_IP_SUBNET: 10.127.127.0
      NODE_IP_NETMASK: 255.255.255.0
      NODE_IP_RANGE_MIN: 10.127.127.100
      NODE_IP_RANGE_MAX: 10.127.127.253
      NODE_IP_ADDRESS: 10.127.127.3
    volumes:
      - ./dhcp:/opt
    cap_add:
      - CAP_NET_BIND_SERVICE
      - CAP_NET_RAW
    ports:
      - 67:67/udp
    networks:
      - opi
    command: sh -e -u -x -c 'touch /var/lib/dhcp/dhcpd.leases && eval "echo \"$$(cat /opt/dhcpd.conf.template)\"" > /etc/dhcp/dhcpd.conf && dhcpd -d'

  # Cisco IOS-XE bring-up: RFC 8572 section 8.2 option 143 served over
  # host networking so DHCPDISCOVERs from physical switches are received
  # on the lab NIC. Only active when the "iosxe" profile is selected:
  #   docker-compose --profile iosxe up -d
  #
  # Rendering: the dhcp-render init container encodes $SZTP_URL via
  # scripts/encode_sztp_url.py and writes /data/dhcpd.conf from
  # dhcp/dhcpd.conf.template. The dhcp-iosxe container then starts
  # dhcpd against the rendered config.
  dhcp-render:
    image: docker.io/library/python:3.12-alpine
    profiles: ["iosxe"]
    volumes:
      - ./dhcp:/data
      - ./scripts/encode_sztp_url.py:/usr/local/bin/encode_sztp_url.py:ro
      - ./scripts/render-dhcpd-conf.sh:/usr/local/bin/render-dhcpd-conf.sh:ro
    environment:
      SZTP_URL: ${SZTP_URL:-https://10.1.1.3:8080}
      NODE_IP_SUBNET: ${NODE_IP_SUBNET:-10.1.1.0}
      NODE_IP_NETMASK: ${NODE_IP_NETMASK:-255.255.255.0}
      NODE_IP_RANGE_MIN: ${NODE_IP_RANGE_MIN:-10.1.1.100}
      NODE_IP_RANGE_MAX: ${NODE_IP_RANGE_MAX:-10.1.1.253}
    entrypoint: ["/bin/sh", "-c"]
    command: ["apk add --no-cache gettext >/dev/null && /usr/local/bin/render-dhcpd-conf.sh"]

  dhcp-iosxe:
    image: docker.io/networkboot/dhcpd:1.3.0
    profiles: ["iosxe"]
    depends_on:
      dhcp-render:
        condition: service_completed_successfully
    volumes:
      - ./dhcp:/data
    cap_add:
      - CAP_NET_BIND_SERVICE
      - CAP_NET_RAW
    network_mode: host

  setup-cert:
    # Offline PKI bootstrap. Replaces the prior step that fetched
    # https://watsen.net/support/sztpd-simulator-0.0.11.tgz (now 404).
    # Uses sztp_local_files/cisco_sudi_ta_chain.pem as the device-identity
    # trust anchor so a real Cisco C9xxx SUDI client cert is accepted.
    image: docker.io/alpine/openssl:3.3.1
    volumes:
      - server-certs:/certs/server
      - client-certs:/certs/client
      - ./sztp_local_files:/local_files:ro
      - ./scripts/setup-cert-offline.sh:/usr/local/bin/setup-cert-offline.sh:ro
    user: "0"
    entrypoint: ["/bin/ash", "/usr/local/bin/setup-cert-offline.sh"]

  web:
    image: docker.io/library/httpd:2.4.57-alpine3.17
    depends_on:
      setup-cert:
        condition: service_completed_successfully
    volumes:
      - server-certs:/certs
      - ./images:/usr/local/apache2/htdocs
    ports:
      - 443:443
    networks:
      - opi
    entrypoint: /bin/ash
    command: |
        -x -e -c '
        sed -i \
        -e "s/^#\(Include .*httpd-ssl.conf\)/\1/" \
        -e "s/^#\(LoadModule .*mod_ssl.so\)/\1/" \
        -e "s/^#\(LoadModule .*mod_socache_shmcb.so\)/\1/" \
        conf/httpd.conf
        sed -i \
        -e "s/^#\(SSLVerifyClient .*require\)/\1/" \
        -e "s/^#\(SSLVerifyDepth .*\)/\1/" \
        -e "s/^#\(SSLCACertificateFile .*\)/\1/" \
        conf/extra/httpd-ssl.conf
        cp /certs/my_cert.pem conf/server.crt
        cp /certs/private_key.pem conf/server.key
        mkdir -p /usr/local/apache2/conf/ssl.crt/
        cp /certs/ta_cert_chain.pem /usr/local/apache2/conf/ssl.crt/ca-bundle.crt
        httpd-foreground
        '
  avahi:
    image: docker.io/flungo/avahi:latest
    environment:
      SERVER_HOST_NAME: "opi"
    networks:
      - opi

  swtpm:
    build:
      context: tpm
    volumes:
      - tpm-data:/swtpm
    networks:
      - opi
    command: ['socket', '--tpm2',
              '--server', 'type=unixio,path=/swtpm/swtpm.sock',
              '--ctrl', 'type=unixio,path=/swtpm/swtpm.sock.ctrl',
              '--tpmstate', 'dir=/swtpm',
              '--log', 'file=swtpm.log',
              '--log', 'level=20',
              '--flags', 'not-need-init,startup-clear']

  swtpm-test:
    image: docker.io/strongx509/tpm:5.9.13
    depends_on:
      - swtpm
    volumes:
      - tpm-data:/swtpm
    networks:
      - opi
    environment:
      TPM2TOOLS_TCTI: swtpm:path=/swtpm/swtpm.sock
    command: ['tpm2', 'clear']

volumes:
  tpm-data:
  server-certs:
  client-certs:

networks:
  opi:
    ipam:
      config:
        - subnet: "10.127.127.0/24"
          gateway: "10.127.127.1"
