---
version: '3.7'

include:
  - docker-compose.dpu.yml

services:
  bootstrap:
    image: docker.io/opiproject/sztpd:0.0.15
    depends_on:
      setup-cert:
        condition: service_completed_successfully
    volumes:
      - server-certs:/certs
      - ./images:/media
      - ./config:/mnt
      - ./local_files:/local_files:ro
      - ./scripts/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh
    entrypoint: /usr/local/bin/docker-entrypoint.sh
    environment:
      SZTPD_INIT_PORT: 6080
      SZTPD_NBI_PORT: 7080
      SZTPD_SBI_PORT: 9090
      SZTPD_INIT_MODE: 1
      SZTPD_ACCEPT_CONTRACT: "Yes"
      SZTPD_INIT_ADDR: 0.0.0.0
      SZTPD_OPI_MODE: "running"
      SZTPD_RETRY_ATTEMPTS: 30
      PYTHONLOGLEVEL: DEBUG
      PYTHONASYNCIODEBUG: "1"
      SZTP_OWNERSHIP_VOUCHER_CMS: /local_files/FCW2126G05V.vcj
      SZTP_OWNER_CERT_CMS: /local_files/owner_cert_chain.cms
      CMS_OWNER_KEY: /local_files/owner-certificate.key
      CMS_OWNER_CERT: /local_files/owner-certificate.crt
      CMS_OWNER_CERT_CHAIN: /local_files/owner_cert_chain.pem
    ports:
      - 7080:7080
      - 9090:9090
    networks:
      - opi
    healthcheck:
      test: ["CMD-SHELL", "curl --fail -H Accept:application/yang-data+json http://127.0.0.1:$$SZTPD_NBI_PORT/.well-known/host-meta || exit 1"]

  redirecter:
    image: docker.io/opiproject/sztpd:0.0.15
    depends_on:
      setup-cert:
        condition: service_completed_successfully
    volumes:
      - server-certs:/certs
      - ./config/sztpd.redirect.json.template:/mnt/sztpd.redirect.json.template
      - ./local_files:/local_files:ro
      - ./scripts/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh
    entrypoint: /usr/local/bin/docker-entrypoint.sh
    environment:
      SZTPD_INIT_PORT: 6080
      SZTPD_NBI_PORT: 7070
      SZTPD_SBI_PORT: 8080
      SZTPD_INIT_MODE: 1
      SZTPD_ACCEPT_CONTRACT: "Yes"
      SZTPD_INIT_ADDR: 0.0.0.0
      BOOTSVR_PORT: 9090
      BOOTSVR_ADDR: "10.1.1.3"
      SZTPD_OPI_MODE: "redirect"
      SZTPD_RETRY_ATTEMPTS: 30
      PYTHONLOGLEVEL: DEBUG
      PYTHONASYNCIODEBUG: "1"
      SZTP_OWNERSHIP_VOUCHER_CMS: /local_files/FCW2126G05V.vcj
      SZTP_OWNER_CERT_CMS: /local_files/owner_cert_chain.cms
      CMS_OWNER_KEY: /local_files/owner-certificate.key
      CMS_OWNER_CERT: /local_files/owner-certificate.crt
      CMS_OWNER_CERT_CHAIN: /local_files/owner_cert_chain.pem
    ports:
      - 8080:8080
    networks:
      - opi
    healthcheck:
      test: ["CMD-SHELL", "curl --fail -H Accept:application/yang-data+json http://127.0.0.1:$$SZTPD_NBI_PORT/.well-known/host-meta || exit 1"]

  # NOTE: In this lab the DHCP server is the upstream Cisco IOS router
  # (10.1.1.3) which serves option 143. The bundled ISC dhcpd below is kept
  # only for reference / fallback use and is gated behind the "dhcp" profile
  # so it does NOT start with a plain `docker-compose up`.
  # To start it explicitly:   docker-compose --profile dhcp up dhcp
  dhcp:
    image: docker.io/networkboot/dhcpd:1.3.0
    profiles: ["dhcp"]
    environment:
      NODE_IP_SUBNET: 10.1.1.0
      NODE_IP_NETMASK: 255.255.255.0
      NODE_IP_RANGE_MIN: 10.1.1.100
      NODE_IP_RANGE_MAX: 10.1.1.253
      NODE_IP_ADDRESS: 10.1.1.3
    volumes:
      - ./dhcp:/opt
    cap_add:
      - CAP_NET_BIND_SERVICE
      - CAP_NET_RAW
    # Use host networking so DHCP broadcasts from physical devices (e.g. Cisco IOS XE)
    # are received on ens19 (10.1.1.0/24). Incompatible with 'networks' and 'ports'.
    network_mode: host
    # sed for env-var substitution (image is debian; no envsubst, and the
    # original eval mangles multi-line comments containing parens/quotes).
    command: ["sh","-e","-u","-x","-c","touch /var/lib/dhcp/dhcpd.leases && sed -e \"s|[$][{]NODE_IP_SUBNET[}]|$$NODE_IP_SUBNET|g\" -e \"s|[$][{]NODE_IP_NETMASK[}]|$$NODE_IP_NETMASK|g\" -e \"s|[$][{]NODE_IP_RANGE_MIN[}]|$$NODE_IP_RANGE_MIN|g\" -e \"s|[$][{]NODE_IP_RANGE_MAX[}]|$$NODE_IP_RANGE_MAX|g\" -e \"s|[$][{]NODE_IP_ADDRESS[}]|$$NODE_IP_ADDRESS|g\" /opt/dhcpd.conf.template > /etc/dhcp/dhcpd.conf && cat /etc/dhcp/dhcpd.conf && exec dhcpd -d -cf /etc/dhcp/dhcpd.conf ens19"]

  setup-cert:
    image: docker.io/alpine/openssl:3.3.1
    volumes:
      - server-certs:/certs/server
      - client-certs:/certs/client
      - ./scripts/setup-cert.sh:/setup-cert.sh
    user: "0"
    entrypoint: /bin/ash
    command: /setup-cert.sh

  web:
    image: docker.io/library/httpd:2.4.57-alpine3.17
    depends_on:
      setup-cert:
        condition: service_completed_successfully
    volumes:
      - server-certs:/certs
      - ./images:/usr/local/apache2/htdocs
    ports:
      - 443:443
    networks:
      - opi
    entrypoint: /bin/ash
    command: |
        -x -e -c '
        sed -i \
        -e "s/^#\(Include .*httpd-ssl.conf\)/\1/" \
        -e "s/^#\(LoadModule .*mod_ssl.so\)/\1/" \
        -e "s/^#\(LoadModule .*mod_socache_shmcb.so\)/\1/" \
        conf/httpd.conf
        sed -i \
        -e "s/^#\(SSLVerifyClient .*require\)/\1/" \
        -e "s/^#\(SSLVerifyDepth .*\)/\1/" \
        -e "s/^#\(SSLCACertificateFile .*\)/\1/" \
        conf/extra/httpd-ssl.conf
        cp /certs/my_cert.pem conf/server.crt
        cp /certs/private_key.pem conf/server.key
        mkdir -p /usr/local/apache2/conf/ssl.crt/
        cp /certs/ta_cert_chain.pem /usr/local/apache2/conf/ssl.crt/ca-bundle.crt
        httpd-foreground
        '
  avahi:
    image: docker.io/flungo/avahi:latest
    environment:
      SERVER_HOST_NAME: "opi"
    networks:
      - opi

  swtpm:
    build:
      context: tpm
    volumes:
      - tpm-data:/swtpm
    networks:
      - opi
    command: ['socket', '--tpm2',
              '--server', 'type=unixio,path=/swtpm/swtpm.sock',
              '--ctrl', 'type=unixio,path=/swtpm/swtpm.sock.ctrl',
              '--tpmstate', 'dir=/swtpm',
              '--log', 'file=swtpm.log',
              '--log', 'level=20',
              '--flags', 'not-need-init,startup-clear']

  swtpm-test:
    image: docker.io/strongx509/tpm:5.9.13
    depends_on:
      - swtpm
    volumes:
      - tpm-data:/swtpm
    networks:
      - opi
    environment:
      TPM2TOOLS_TCTI: swtpm:path=/swtpm/swtpm.sock
    command: ['tpm2', 'clear']

volumes:
  tpm-data:
  server-certs:
  client-certs:

networks:
  opi:
    ipam:
      config:
        - subnet: "10.127.127.0/24"
          gateway: "10.127.127.1"
