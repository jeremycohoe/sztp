# ISC dhcpd snippet for RFC 8572 §8.2 option 143.
#
# Paste into your existing dhcpd.conf, adjusting subnet / range as needed.
# Regenerate the binary payload for your own URL(s) with:
#
#   python3 scripts/encode_sztp_url.py https://YOUR-BOOTSTRAP-HOST:8080
#
# The example below encodes a single URI: https://10.1.1.3:8080.

option sztp-redirect-urls code 143 = string;

subnet 10.1.1.0 netmask 255.255.255.0 {
    range 10.1.1.100 10.1.1.253;
    default-lease-time 600;
    max-lease-time 7200;

    option sztp-redirect-urls 00:15:68:74:74:70:73:3a:2f:2f:31:30:2e:31:2e:31:2e:33:3a:38:30:38:30;
}
